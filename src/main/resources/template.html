<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: 'Noto Sans CJK JP', sans-serif;
            margin: 40px;
        }
        h1 {
            font-family: 'Noto Sans CJK JP', sans-serif;
            color: #333;
        }
        h2 {
            font-family: 'Noto Sans CJK JP', sans-serif;
        }
        p {
            font-family: 'Noto Sans CJK JP', sans-serif;
            line-height: 1.6;
            color: #666;
        }
        ul, li {
            font-family: 'Noto Sans CJK JP', sans-serif;
        }
    </style>
</head>
<body>
    <h1>PDF サンプル文書</h1>
    <p>
        これは Flying Saucer を使用して生成された PDF ドキュメントのサンプルです。
    </p>
    <p>
        日本語のテキストが正しく表示されることを確認するためのサンプルテキストです。
        Spring Boot アプリケーションから HTML を PDF に変換しています。
    </p>
    <h2>主な機能</h2>
    <ul>
        <li>HTML から PDF への変換</li>
        <li>日本語フォントのサポート</li>
        <li>オンザフライでの PDF 生成</li>
    </ul>
</body>
</html>
